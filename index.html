<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的專屬相簿</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* --- 基礎設定與排版 --- */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f9f9f9; }
        header { background-color: #ffffff; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; font-size: 24px; color: #333; }
        
        /* --- 按鈕樣式 --- */
        .btn { padding: 10px 15px; margin-left: 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background 0.3s; }
        .btn-upload { background-color: #4285f4; color: white; }
        .btn-upload:hover { background-color: #3367d6; }
        .btn-qr { background-color: #34a853; color: white; }
        .btn-qr:hover { background-color: #2b803e; }
        
        /* --- 相片牆 (響應式網格) --- */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px; }
        .gallery img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s; }
        .gallery img:hover { transform: scale(1.02); }

        /* --- 燈箱 (點擊放大後的視窗) --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 75vh; border-radius: 8px; margin-bottom: 20px; }
        .lightbox-controls { display: flex; gap: 15px; }
        .btn-close { position: absolute; top: 20px; right: 30px; font-size: 30px; color: white; cursor: pointer; background: none; border: none; }
        
        /* --- 隱藏的原生上傳按鈕 --- */
        #file-upload { display: none; }

        /* --- 列印專屬樣式 (列印時只顯示大圖，隱藏其他網頁元素) --- */
        @media print {
            body * { visibility: hidden; }
            #lightbox, #lightbox img { visibility: visible; }
            #lightbox { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            #lightbox img { width: 100%; height: auto; max-height: 100%; margin: 0; border-radius: 0; }
            .lightbox-controls, .btn-close { display: none !important; }
        }
    </style>
</head>
<body>

    <header>
        <h1>我的專屬相簿</h1>
        <div>
            <input type="file" id="file-upload" accept="image/*" multiple>
            <button class="btn btn-upload" onclick="document.getElementById('file-upload').click()">+ 上傳照片</button>
            <button class="btn btn-qr" onclick="generateQR()">產生 QR Code</button>
        </div>
    </header>

    <div class="gallery" id="gallery">
        <img src="https://picsum.photos/id/1015/500/500" alt="風景照 1" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/1016/500/500" alt="風景照 2" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/1018/500/500" alt="風景照 3" onclick="openLightbox(this.src)">
        <img src="https://picsum.photos/id/1019/500/500" alt="風景照 4" onclick="openLightbox(this.src)">
    </div>

    <div id="lightbox">
        <button class="btn-close" onclick="closeLightbox()">×</button>
        <img id="lightbox-img" src="" alt="放大照片">
        <div class="lightbox-controls">
            <a id="download-link" href="" download="my_photo.jpg">
                <button class="btn btn-upload">下載照片</button>
            </a>
            <button class="btn btn-qr" onclick="window.print()">列印照片</button>
        </div>
    </div>

    <div id="qr-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; flex-direction: column;">
        <div style="background: white; padding: 30px; border-radius: 10px; text-align: center; position: relative;">
            <button onclick="closeQR()" style="position: absolute; top: 10px; right: 15px; border: none; background: none; font-size: 24px; cursor: pointer; color: #999;">×</button>
            <h2 style="margin-top: 0; color: #333; font-size: 18px;">掃描條碼分享相簿</h2>
            <div id="qrcode-container" style="margin: 20px auto; display: flex; justify-content: center;"></div>
            <p style="color: #666; font-size: 14px; margin-bottom: 0;">請用手機相機掃描上方 QR Code</p>
        </div>
    </div>

    <script>
        // --- 燈箱互動邏輯 ---
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const downloadLink = document.getElementById('download-link');

        function openLightbox(imageSrc) {
            lightbox.style.display = 'flex';
            lightboxImg.src = imageSrc;
            downloadLink.href = imageSrc; 
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
        }

        // --- 模擬上傳功能 ---
        document.getElementById('file-upload').addEventListener('change', function(event) {
            const files = event.target.files;
            if (files.length > 0) {
                alert(`已選擇 ${files.length} 張照片。未來這裡將會串接 API 將照片傳送至雲端！`);
            }
        });

        // --- 真實 QR Code 生成邏輯 ---
        const qrModal = document.getElementById('qr-modal');
        const qrContainer = document.getElementById('qrcode-container');
        let qrCodeGenerated = false; 

        function generateQR() {
            qrModal.style.display = 'flex'; 
            const currentUrl = window.location.href; 
            
            if (!qrCodeGenerated) {
                qrContainer.innerHTML = ""; // 確保清空容器
                new QRCode(qrContainer, {
                    text: currentUrl,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H 
                });
                qrCodeGenerated = true; 
            }
        }

        function closeQR() {
            qrModal.style.display = 'none';
        }
    </script>
</body>
</html>
